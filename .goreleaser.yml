version: 2

# gomod:
#   proxy: true # proxying breaks embedding of files produced by `make buildweb` during release
before:
  hooks:
    - go mod download

builds:
- id: device-admin
  main: ./cmd/deviceadmin
  binary: device-admin
  mod_timestamp: "{{ .CommitTimestamp }}"
  flags:
    - -trimpath
  ldflags:
    - -w
    - -X main.buildSummary={{ .Summary }}
    - -X main.buildVersion={{ .Version }}
    - -X main.buildCommitFull={{ .FullCommit }}
    - -X main.buildCommitShort={{ .ShortCommit }}
    - -X main.buildCommitDate={{ .CommitDate }}
    - -X main.buildCommitTimestamp={{ .CommitTimestamp }}
    - -X main.buildReleaseURL={{ .ReleaseURL }}
    - -X main.buildRepo={{ .GitURL }}
    - -X main.buildSystem=goreleaser
  env:
    - CGO_ENABLED=0
  targets:
    - linux_amd64_v1
    - linux_arm64
    # - darwin_amd64_v1
    # - darwin_arm64
    # - windows_amd64_v1

archives:
  - id: device-admin
    ids: ["device-admin"]
    name_template: "device-admin_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - 'LICENSE*'
      - 'README*'
      - 'CHANGELOG*'
      - 'license*'
      - 'readme*'
      - 'changelog*'
      - 'web/templates/**'

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 10
    - title: Builds
      regexp: '^.*?build(\([[:word:]]+\))??!?:.+$'
      order: 20
    - title: etc
      order: 30
  filters:
    exclude:
      - '^.*?chore(\([[:word:]]+\))??!?:.+$'
      - '^.*?docs(\([[:word:]]+\))??!?:.+$'
      - '^.*?test(\([[:word:]]+\))??!?:.+$'
      - '^.*?ci(\([[:word:]]+\))??!?:.+$'

release:
  prerelease: auto
  footer: |
    {{ if and .Tag .PreviousTag -}}
      **Commit history**: [{{ .PreviousTag }}...{{ .Tag }}]({{ .GitURL }}/compare/{{ .Tag }}...{{ .PreviousTag }})
    {{- else if .PreviousTag -}}
      **Commit history**: [{{ .PreviousTag }}...{{ .ShortCommit }}]({{ .GitURL }}/compare/{{ .Commit }}...{{ .PreviousTag }})
    {{- end }}
